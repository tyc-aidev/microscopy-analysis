run_name: ebc2_unetpp_se_resnet50_micronet
data_root: data/benchmark_segmentation_data
output_dir: results
seed: 42

dataset:
  name: EBC2
  family: ebc
  split: train

model:
  architecture: UnetPlusPlus
  encoder_name: se_resnet50
  pretraining: micronet
  num_classes: 1

optimizer:
  lr_phase1: 0.0002
  lr_phase2: 0.00001

trainer:
  patience: 30
  max_epochs_phase1: 120
  max_epochs_phase2: 60
  resume: false

logging:
  backend: none

augmentation:
  flip_p: 0.5
