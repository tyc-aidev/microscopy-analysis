run_name: super1_baseline_unetpp_resnet50_micronet
data_root: data/benchmark_segmentation_data
output_dir: results
seed: 42

dataset:
  name: Super1
  family: super
  split: train

model:
  architecture: UnetPlusPlus
  encoder_name: resnet50
  pretraining: micronet
  num_classes: 3

optimizer:
  lr_phase1: 0.0002
  lr_phase2: 0.00001

trainer:
  patience: 30
  max_epochs_phase1: 120
  max_epochs_phase2: 60

