name: Reproduction tests (torch-free)

# Sprint 0 foundation checks. The paper-pinned CUDA stack (torch 1.10.1 / smp
# 0.2.1) does not install on hosted runners, so this job runs the torch-free
# reproduction suite; tests that need torch self-skip (e.g. test_repro_device).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  repro-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install torch-free test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest numpy Pillow

      - name: Run reproduction tests
        run: |
          pytest -q \
            tests/test_repro_weights.py \
            tests/test_repro_config.py \
            tests/test_repro_datasets.py \
            tests/test_repro_factory.py \
            tests/test_repro_device.py \
            tests/test_dataset_adapter.py \
            tests/test_train_pipeline.py
